<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rapid — CRM for Pressure Washing Pros</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<meta name="theme-color" content="#2F6BFF">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="boot"><div class="boot-mark">
  <svg viewBox="0 0 24 24" fill="none"><path d="M13 2L4 14H11L10 22L20 9H13L13 2Z" fill="white"/></svg>
</div></div>

<canvas id="confetti-canvas"></canvas>
<div id="toast-wrap"></div>

<!-- Command palette -->
<div class="cmdk-backdrop" id="cmdk-backdrop">
  <div class="cmdk">
    <div class="cmdk-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="text" id="cmdk-input" placeholder="Search or jump to…" oninput="renderCmdkList(this.value)">
      <button class="close-x" onclick="closeCmdk()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="cmdk-list" id="cmdk-list"></div>
  </div>
</div>

<div id="app">
  <nav class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none"><path d="M13 2L4 14H11L10 22L20 9H13L13 2Z" fill="white"/></svg>
      </div>
      <div><div class="brand-name">Rapid</div><div class="brand-sub">CRM</div></div>
    </div>

    <div class="nav-scroll" id="nav-main"></div>

    <div class="sidebar-footer">
      <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon"></span><span id="theme-label">Dark mode</span></button>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <div class="breadcrumbs" id="breadcrumbs"></div>
      <button class="search-trigger" onclick="openCmdk()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <span>Search everywhere…</span>
        <span class="kbd">⌘K</span>
      </button>
      <div class="topbar-right">
        <button class="icon-btn" title="Notifications"><span class="icon-dot"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
        </button>
        <div class="avatar" title="Alex Rivera">AR</div>
      </div>
    </div>

    <div class="view-scroll" id="view-scroll"></div>
  </div>
</div>

<nav class="bottom-nav" id="bottom-nav"></nav>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal-content"></div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
